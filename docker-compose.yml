services:
  app:
    image: ghcr.io/bobh233/dglab-ai:latest
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: "3001"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: dglab_ai
      TTS_CACHE_DIR: /app/data/tts-cache
    ports:
      - "17039:3001"
    volumes:
      - ${TTS_CACHE_PATH:-./tts_cache}:/app/data/tts-cache
    restart: unless-stopped
    networks:
      - dglab-ai-network

  mongodb:
    image: mongo:7
    container_name: dglab-ai-mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ${MONGO_DATA_PATH:-./mongo_data}:/data/db
    networks:
      - dglab-ai-network

networks:
  dglab-ai-network:
    driver: bridge
